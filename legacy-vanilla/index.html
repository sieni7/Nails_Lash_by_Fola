<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#075E54">
  <title>Nails & Lash by Fola | Salon de Beauté Bingerville</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="app-container">
    <!-- Header WhatsApp -->
    <header class="wa-header">
      <div class="wa-header__avatar">
        <img src="assets/images/logo.png" alt="Nails & Lash by Fola" onerror="this.src='https://placehold.co/48x48/075E54/white?text=F'">
      </div>
      <div class="wa-header__info">
        <h1>Nails & Lash by Fola</h1>
        <div class="status">🟢 En ligne · Ouvert</div>
      </div>
    </header>

    <!-- Bannière horaires -->
    <div class="hours-banner">
      📍 Bingerville | 🕒 Mar-Dim 9h-21h
    </div>

    <!-- CATÉGORIES - Grille sans scroll -->
    <div class="categories-grid" id="categories-filter"></div>

    <!-- PRESTATIONS -->
    <main class="main-content">
      <div class="prestations-grid" id="prestations-container">
        <!-- SKELETON LOADER -->
        <div class="skeleton-card">
          <div class="skeleton-header">
            <div class="skeleton-anim skeleton-badge"></div>
            <div class="skeleton-anim skeleton-icon"></div>
          </div>
          <div class="skeleton-anim skeleton-title"></div>
          <div class="skeleton-anim skeleton-desc"></div>
          <div class="skeleton-anim skeleton-desc" style="width: 60%"></div>
          <div class="skeleton-footer">
            <div class="skeleton-anim skeleton-price"></div>
            <div class="skeleton-anim skeleton-price" style="width: 80px"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-header">
            <div class="skeleton-anim skeleton-badge"></div>
            <div class="skeleton-anim skeleton-icon"></div>
          </div>
          <div class="skeleton-anim skeleton-title"></div>
          <div class="skeleton-anim skeleton-desc"></div>
          <div class="skeleton-anim skeleton-desc" style="width: 60%"></div>
          <div class="skeleton-footer">
            <div class="skeleton-anim skeleton-price"></div>
            <div class="skeleton-anim skeleton-price" style="width: 80px"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-header">
            <div class="skeleton-anim skeleton-badge"></div>
            <div class="skeleton-anim skeleton-icon"></div>
          </div>
          <div class="skeleton-anim skeleton-title"></div>
          <div class="skeleton-anim skeleton-desc"></div>
          <div class="skeleton-anim skeleton-desc" style="width: 60%"></div>
          <div class="skeleton-footer">
            <div class="skeleton-anim skeleton-price"></div>
            <div class="skeleton-anim skeleton-price" style="width: 80px"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Panier flottant -->
    <div class="cart-fab" id="cart-fab" onclick="openCartModal()">
      <span class="cart-icon">🛒</span>
      <span class="cart-count" id="cart-count">0</span>
    </div>

    <!-- Modal panier -->
    <div class="modal" id="cart-modal">
      <div class="modal-content">
        <div class="modal-header">
          <span class="modal-title">🛍️ Votre panier</span>
          <span class="close-modal" onclick="closeCartModal()">&times;</span>
        </div>
        <div id="cart-modal-content"></div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS - Ordre correct -->
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/slots.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // Initialisation après chargement
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof initApp === 'function') {
        initApp();
      }
    });
  </script>
</body>
</html>
