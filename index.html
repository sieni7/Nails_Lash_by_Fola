<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#075E54">
  <meta name="description" content="Salon de beauté Nails & Lash by Fola à Bingerville, Côte d'Ivoire. Commandez vos prestations nail art, extension cils directement via WhatsApp.">
  <meta name="keywords" content="salon beauté, ongles, cils, Bingerville, Côte d'Ivoire, nail art, extension cils, WhatsApp">
  <meta name="author" content="Nails & Lash by Fola">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nails-lash-fola.netlify.app/">
  <meta property="og:title" content="Nails & Lash by Fola - Salon de Beauté">
  <meta property="og:description" content="Commandez vos prestations beauté via WhatsApp à Bingerville">
  <meta property="og:image" content="assets/images/logo.png">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary">
  <meta property="twitter:url" content="https://nails-lash-fola.netlify.app/">
  <meta property="twitter:title" content="Nails & Lash by Fola">
  <meta property="twitter:description" content="Salon de beauté à Bingerville">
  
  <title>Nails & Lash by Fola | Salon de Beauté Bingerville</title>
  
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">
  
  <!-- Preload critical assets -->
  <link rel="preload" href="assets/css/variables.css" as="style">
  <link rel="preload" href="js/config.js" as="script">
  
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="app-container">
    <!-- Header WhatsApp style -->
    <header class="wa-header">
      <div class="wa-header__avatar">
        <img src="assets/images/logo.png" alt="Nails & Lash by Fola" id="logo-placeholder">
      </div>
      <div class="wa-header__info">
        <h1>Nails & Lash by Fola</h1>
        <div class="status">🟢 En ligne · Ouvert</div>
      </div>
    </header>

    <!-- Horaires banner -->
    <div class="hours-banner">
      📍 Bingerville | 🕒 Mar-Dim 9h-21h
    </div>

    <!-- Gallery Container -->
    <div id="gallery-container"></div>

    <!-- Main content : prestations grid -->
    <main class="main-content">
      <div class="prestations-grid" id="prestations-container">
        <!-- Rempli dynamiquement par JS -->
      </div>
    </main>

    <!-- Panier flottant (WhatsApp style) -->
    <div class="cart-fab" id="cart-fab">
      <span class="cart-icon">🛒</span>
      <span class="cart-count" id="cart-count">0</span>
    </div>

    <!-- Modal panier (caché par défaut) -->
    <div class="modal" id="cart-modal">
      <!-- Contenu panier -->
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/slots.js"></script>
  <script src="js/app.js"></script>

  <!-- Admin hidden link (tapoter 5 fois sur le logo) -->
  <div style="display: none;" id="admin-trigger"></div>

  <script>
      // Accès admin caché : taper 5 fois sur le header
      let adminClickCount = 0;
      let adminTimer = null;
      
      document.querySelector('.wa-header')?.addEventListener('click', () => {
          adminClickCount++;
          if (adminTimer) clearTimeout(adminTimer);
          adminTimer = setTimeout(() => { adminClickCount = 0; }, 1000);
          
          if (adminClickCount >= 5) {
              window.location.href = 'admin.html';
              adminClickCount = 0;
          }
      });
      
      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered!', reg);
          }).catch(err => console.log('SW registration failed', err));
        });
      }
  </script>
  <script src="js/performance.js"></script>
  <script src="js/accessibility.js"></script>
</body>
</html>
